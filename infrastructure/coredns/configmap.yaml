# CoreDNS Corefile for the p5-dev cluster.
#
# Why we manage this in Git (not letting kind own it):
# kind sets up CoreDNS to forward external lookups via the node's
# /etc/resolv.conf — which on this laptop points to Docker's embedded
# DNS at 172.20.0.1:53. That resolver gets into "server misbehaving"
# states whenever the host network changes (wifi switch, suspend, etc.)
# and breaks every pod's name resolution until rebooted.
#
# Forwarding directly to 1.1.1.1 + 8.8.8.8 bypasses that brittle layer.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        prometheus :9153
        forward . 1.1.1.1 8.8.8.8 {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
