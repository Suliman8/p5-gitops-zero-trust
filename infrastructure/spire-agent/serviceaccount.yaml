# The agent's "name tag" inside Kubernetes.
# K8s automatically gives this account a short-lived token; SPIRE Server
# checks that token to confirm "yes, this is really a node-level agent
# in the p5-dev cluster" — that's the PSAT attestation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-agent
  namespace: spire-server
