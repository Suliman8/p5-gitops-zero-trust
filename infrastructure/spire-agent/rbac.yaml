# The agent's "key ring" — what it's allowed to look at.
#
# Why these specific permissions:
#  - pods (get/list) → so the workload attestor can check pod metadata
#    (namespace, labels, ServiceAccount) when a pod asks for an SVID
#  - nodes (get) → so the agent can look up info about its own node
#
# We deliberately do NOT grant tokenreviews — that's the SPIRE Server's
# job (Week 2), not the agent's. Minimum necessary privileges.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # `nodes/proxy` is needed by the K8s WorkloadAttestor's "new container
  # locator" (default in spire-agent 1.14+). It calls
  #   GET /api/v1/nodes/<node>/proxy/pods
  # to discover pod metadata via the API server proxy instead of talking
  # to kubelet directly. Without this, workload attestation fails with
  # 403 Forbidden and pods get "no identity issued".
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-agent
subjects:
  - kind: ServiceAccount
    name: spire-agent
    namespace: spire-server
