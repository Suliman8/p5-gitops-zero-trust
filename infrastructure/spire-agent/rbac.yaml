# The agent's "key ring" — what it's allowed to look at.
#
# Why these specific permissions:
#  - pods (get/list) → so the workload attestor can check pod metadata
#    (namespace, labels, ServiceAccount) when a pod asks for an SVID
#  - nodes (get) → so the agent can look up info about its own node
#
# We deliberately do NOT grant tokenreviews — that's the SPIRE Server's
# job (Week 2), not the agent's. Minimum necessary privileges.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-agent
subjects:
  - kind: ServiceAccount
    name: spire-agent
    namespace: spire-server
