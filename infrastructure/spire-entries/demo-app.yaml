# Workload identity for demo-app pods.
#
# Behavior:
#   For every pod in the `demo` namespace that the controller observes,
#   create a SPIRE registration entry such that the pod, when it calls
#   the agent's Workload API, receives an X.509 SVID with the SPIFFE ID
#   spiffe://p5.local/demo-app.
#
# How the matching works:
#   1. namespaceSelector picks WHICH namespaces are eligible (label
#      kubernetes.io/metadata.name=demo is auto-applied by K8s to every
#      namespace, so this is the canonical way to filter by namespace
#      name without adding our own labels).
#   2. (No podSelector) → every pod in the demo namespace qualifies.
#   3. The controller emits one entry per matched pod, with the SPIRE
#      workload selector `k8s:pod-uid:<that pod's uid>` automatically
#      injected. That selector is the strongest possible match — only
#      THAT specific pod can ever fetch this SVID.
#   4. parentID is rendered from `parentIDTemplate` in the controller
#      manager's config, resolving to the node-alias entry above. That
#      keeps the chain: pod → node-alias → spire/server.
#
# Compared to Week 3's imperative entry (k8s:ns:demo, k8s:sa:default):
#   Old: ONE entry rule, matches all pods in demo ns with sa=default.
#   New: MULTIPLE entries, one per pod, keyed by pod UID. Stricter.
#        When a pod is deleted, its entry is automatically reaped.
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: demo-app
spec:
  spiffeIDTemplate: "spiffe://{{ .TrustDomain }}/demo-app"
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: demo
