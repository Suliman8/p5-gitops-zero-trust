# Service for SPIRE Server.
#
# Why "headless" (clusterIP: None)?
#   - StatefulSet pods need stable DNS names (e.g. spire-server-0.spire-server.spire-server.svc).
#   - Headless service gives DNS A records that point straight to pod IPs (no load balancer).
#   - Agents in Week 3 will dial spire-server.spire-server.svc.cluster.local:8081.
apiVersion: v1
kind: Service
metadata:
  name: spire-server
  namespace: spire-server
spec:
  type: ClusterIP
  clusterIP: None              # headless
  selector:
    app: spire-server
  ports:
    - name: grpc
      port: 8081
      targetPort: 8081
      protocol: TCP
