# Bundles all SPIRE Server resources into one ArgoCD-deployable unit.
# When ArgoCD syncs this folder, it applies every resource listed here as one set.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - configmap.yaml
  - statefulset.yaml
  - service.yaml
