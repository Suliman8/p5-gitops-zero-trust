# SPIRE Server runs as a StatefulSet (NOT a Deployment).
#
# Why StatefulSet?
#   - SPIRE Server has IDENTITY (the cluster's root CA private key + SQLite DB).
#   - It needs a stable name (`spire-server-0`) and stable storage that survives
#     pod restarts. Lose the disk → lose the CA → every issued SVID becomes invalid.
#   - StatefulSet's `volumeClaimTemplates` automatically provisions a PVC per pod.
#
# Single replica is fine for now (Week 2). HA = Week 6+ topic.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-server
  namespace: spire-server
  labels:
    app: spire-server
spec:
  replicas: 1
  serviceName: spire-server   # headless service for stable DNS (defined in service.yaml)
  selector:
    matchLabels:
      app: spire-server
  template:
    metadata:
      labels:
        app: spire-server
    spec:
      serviceAccountName: spire-server
      containers:
        - name: spire-server
          image: ghcr.io/spiffe/spire-server:1.14.6
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /run/spire/config/server.conf
          ports:
            - name: grpc
              containerPort: 8081
              protocol: TCP
            - name: healthz
              containerPort: 8080
              protocol: TCP
          # K8s asks "are you alive?" / "are you ready?" via these HTTP probes.
          # SPIRE serves them from the health_checks listener configured in the ConfigMap.
          livenessProbe:
            httpGet:
              path: /live
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 3
            failureThreshold: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-data
              mountPath: /run/spire/data
              readOnly: false
            # Shared with the spire-controller-manager sidecar. SPIRE
            # writes its admin Unix socket here; the sidecar reads it.
            - name: spire-server-socket
              mountPath: /tmp/spire-server/private
              readOnly: false
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

        # ---------------------------------------------------------------
        # spire-controller-manager — sidecar that translates ClusterSPIFFEID
        # / ClusterStaticEntry CRDs into SPIRE registration entries via
        # the admin socket above. Runs in the same pod (Week 4 design).
        # ---------------------------------------------------------------
        - name: spire-controller-manager
          image: ghcr.io/spiffe/spire-controller-manager:0.6.4
          imagePullPolicy: IfNotPresent
          args:
            - --config=/run/controller-manager/config/controller-manager-config.yaml
          env:
            # The webhook server requires SPIRE-issued TLS certs. We keep
            # the wiring simple in W4 by turning the admission-time
            # validator off — invalid CRs surface in `status` instead.
            - name: ENABLE_WEBHOOKS
              value: "false"
          ports:
            - name: ctrl-health
              containerPort: 8083
              protocol: TCP
            - name: ctrl-metrics
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: ctrl-health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: ctrl-health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: spire-server-socket
              mountPath: /tmp/spire-server/private
              readOnly: true
            - name: controller-manager-config
              mountPath: /run/controller-manager/config
              readOnly: true
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

        # ---------------------------------------------------------------
        # spire-oidc-discovery-provider — sidecar that exposes SPIRE's
        # JWT signing keys via the standard OIDC discovery endpoints
        # (/.well-known/openid-configuration and /keys). Vault uses these
        # to verify JWT-SVID signatures without speaking SPIFFE-native.
        #
        # Talks to the SPIRE Server via the same admin Unix socket that
        # the controller-manager uses (shared via the existing
        # spire-server-socket emptyDir).
        # ---------------------------------------------------------------
        - name: spire-oidc-discovery-provider
          image: ghcr.io/spiffe/oidc-discovery-provider:1.14.6
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /run/oidc-provider/config/oidc-discovery-provider.conf
          ports:
            - name: oidc-http
              containerPort: 8090
              protocol: TCP
          volumeMounts:
            # Same emptyDir as controller-manager — gives us access to
            # SPIRE Server's admin socket at .../private/api.sock.
            - name: spire-server-socket
              mountPath: /tmp/spire-server/private
              readOnly: true
            - name: oidc-provider-config
              mountPath: /run/oidc-provider/config
              readOnly: true
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      volumes:
        - name: spire-config
          configMap:
            name: spire-server-config
        - name: controller-manager-config
          configMap:
            name: spire-controller-manager-config
        - name: oidc-provider-config
          configMap:
            name: spire-oidc-discovery-provider
        # The socket bridge between SPIRE Server and Controller Manager.
        # emptyDir is the right primitive: ephemeral, pod-scoped, both
        # containers can rw — exactly what a Unix socket needs.
        - name: spire-server-socket
          emptyDir: {}
  # Persistent storage for the SQLite DB and CA keys.
  # Lost = lost trust → all issued SVIDs become invalid.
  volumeClaimTemplates:
    - metadata:
        name: spire-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
