# SPIRE Server runs as a StatefulSet (NOT a Deployment).
#
# Why StatefulSet?
#   - SPIRE Server has IDENTITY (the cluster's root CA private key + SQLite DB).
#   - It needs a stable name (`spire-server-0`) and stable storage that survives
#     pod restarts. Lose the disk → lose the CA → every issued SVID becomes invalid.
#   - StatefulSet's `volumeClaimTemplates` automatically provisions a PVC per pod.
#
# Single replica is fine for now (Week 2). HA = Week 6+ topic.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-server
  namespace: spire-server
  labels:
    app: spire-server
spec:
  replicas: 1
  serviceName: spire-server   # headless service for stable DNS (defined in service.yaml)
  selector:
    matchLabels:
      app: spire-server
  template:
    metadata:
      labels:
        app: spire-server
    spec:
      serviceAccountName: spire-server
      containers:
        - name: spire-server
          image: ghcr.io/spiffe/spire-server:1.14.6
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /run/spire/config/server.conf
          ports:
            - name: grpc
              containerPort: 8081
              protocol: TCP
            - name: healthz
              containerPort: 8080
              protocol: TCP
          # K8s asks "are you alive?" / "are you ready?" via these HTTP probes.
          # SPIRE serves them from the health_checks listener configured in the ConfigMap.
          livenessProbe:
            httpGet:
              path: /live
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 3
            failureThreshold: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-data
              mountPath: /run/spire/data
              readOnly: false
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: spire-config
          configMap:
            name: spire-server-config
  # Persistent storage for the SQLite DB and CA keys.
  # Lost = lost trust → all issued SVIDs become invalid.
  volumeClaimTemplates:
    - metadata:
        name: spire-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
