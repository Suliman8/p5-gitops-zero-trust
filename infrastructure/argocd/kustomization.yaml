# ArgoCD install — pinned upstream release for reproducibility.
# Anyone cloning this repo and running `kubectl apply -k infrastructure/argocd/`
# gets the EXACT same setup.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.9/manifests/install.yaml

# Patch: expose argocd-server via NodePort so the kind hostPort mapping
# (8453 -> 30443) lets us reach the UI at https://localhost:8453 from the host.
patches:
  - target:
      kind: Service
      name: argocd-server
    patch: |
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30080
      - op: add
        path: /spec/ports/1/nodePort
        value: 30443

  # Use locally cached images instead of always re-pulling from upstream registries.
  # In a kind dev cluster the node DNS can break (`172.20.0.1:53 server misbehaving`)
  # and `imagePullPolicy: Always` then fails even when the image is already on the node.
  # `IfNotPresent` is the right policy for pinned image tags anyway — they are immutable.
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/part-of=argocd
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
  - target:
      kind: StatefulSet
      labelSelector: app.kubernetes.io/part-of=argocd
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
  # The dex Deployment has an initContainer (`copyutil`) that also defaults to Always.
  - target:
      kind: Deployment
      name: argocd-dex-server
    patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/imagePullPolicy
        value: IfNotPresent
