# ServiceAccount for the CSI driver DaemonSet.
#
# The driver itself doesn't need RBAC against the K8s API — it only talks
# to the kubelet (via CSI gRPC) and the SPIRE agent (via Unix socket).
# So this SA has no Role/ClusterRole bindings. Plain SA exists for audit
# clarity and to scope future RBAC if we ever need it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spiffe-csi-driver
  namespace: spire-server
