# demo-server (Week 6) — plain HTTP server inside a service mesh.
#
# What changed vs Week 5:
#   - image bumped to v0.2.0 (Go code uses only net/http now; no go-spiffe)
#   - containerPort + service port: 8443 → 8080 (plain HTTP)
#   - REMOVED: spire-agent-socket hostPath volume + mount
#       The hand-coded SPIFFE Workload API code is gone, so the app
#       doesn't need the socket anymore. The Istio sidecar still needs
#       it — but that comes from a CSI volume added by the "spire"
#       injection template (see annotation below).
#   - ADDED: pod annotation inject.istio.io/templates=sidecar,spire
#       This opts the injected sidecar into mounting the SPIRE socket
#       via the CSI driver. Without this, the sidecar would use the
#       default template (which expects Citadel-issued certs).
#
# Security posture unchanged: non-root, ro rootfs, dropped caps, seccomp.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-server
  namespace: demo-server
  labels:
    app: demo-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-server
  template:
    metadata:
      labels:
        app: demo-server
      # Week 6 note: we INTENDED to opt into the SPIRE sidecar template
      # (inject.istio.io/templates: "sidecar,spire") so SVIDs come from
       # SPIRE. That failed because of a SPIRE+kind+cgroup-v2 attestor
      # bug we couldn't fix in-session. Using the DEFAULT template means
      # sidecars get certs from Istio's built-in Citadel CA. The trust
      # domain stays p5.local so SPIFFE IDs look the same in policies;
      # the only difference is who signs (Citadel vs SPIRE). Revisit in
      # a later week with SPIRE 1.15+ or a non-kind cluster.
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-server
          image: demo-server:v0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
