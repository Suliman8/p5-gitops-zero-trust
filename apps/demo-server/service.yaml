# demo-server Service.
#
# Week 6 changes:
#   - port: 8443 → 80 (plain HTTP — sidecar wraps in mTLS transparently)
#   - port NAME: "https" → "http" — IMPORTANT.
#
# Why the port NAME matters in Istio:
#   Istio uses the port name PREFIX to detect application protocol.
#   "http"   → L7 routing/AuthorizationPolicy by HTTP method/path
#   "http2"  → L7 over h2
#   "tcp"    → L4 only, no L7 features
#   "https"  → assumes the app does its own TLS, sidecar passes through
#              (this is what we'd want in W5; NOT what we want now)
#   Misnaming → Istio falls back to L4 mode, AuthorizationPolicies that
#   match by HTTP method or principal won't work, and you wonder why
#   for an hour. Naming this "http" is the difference between "policy
#   works" and "policy looks correct but is silently bypassed."
apiVersion: v1
kind: Service
metadata:
  name: demo-server
  namespace: demo-server
spec:
  type: ClusterIP
  selector:
    app: demo-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
