# demo-server namespace, NOW labeled for Istio sidecar injection.
#
# Two labels matter:
#   kubernetes.io/metadata.name → still selected by W5 ClusterSPIFFEIDs
#                                 (legacy mode, will get pruned in W7)
#   istio-injection=enabled     → tells the Istio mutating webhook to
#                                 add an istio-proxy sidecar to every
#                                 pod created in this namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: demo-server
  labels:
    kubernetes.io/metadata.name: demo-server
    istio-injection: enabled
