# demo-app (Week 6) — plain HTTP client inside the mesh.
#
# What changed vs Week 5:
#   - image bumped to v0.2.0 (Go code stripped to ~30 lines of stdlib)
#   - REMOVED: spire-agent-socket hostPath volume + mount + 3 env vars
#       (SPIFFE_ENDPOINT_SOCKET, TARGET_URL still kept but http://)
#   - TARGET_URL changed from https://...:8443/ to http://.../
#       The sidecar intercepts outbound traffic and originates mTLS to
#       the demo-server sidecar. From this code's view: 2010 again.
#   - ADDED: pod annotation inject.istio.io/templates=sidecar,spire
#       So this pod's sidecar mounts the SPIRE agent socket via CSI.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  labels:
    app: demo-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
      # Week 6 note: SPIRE-as-CA integration deferred (see demo-server
      # deployment.yaml for explanation). Using default sidecar template
      # so sidecars get Citadel-issued certs.
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-client
          image: demo-client:v0.2.0
          imagePullPolicy: IfNotPresent
          env:
            - name: TARGET_URL
              value: http://demo-server.demo-server.svc.cluster.local/
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
