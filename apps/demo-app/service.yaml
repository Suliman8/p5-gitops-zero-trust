# Stable internal address for the demo-app pods.
# ClusterIP = only reachable from inside the cluster — that's all we need to prove GitOps works.
apiVersion: v1
kind: Service
metadata:
  name: demo-app
spec:
  type: ClusterIP
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
