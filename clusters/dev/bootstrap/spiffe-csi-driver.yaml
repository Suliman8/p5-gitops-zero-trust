# ArgoCD Application for spiffe-csi-driver.
#
# Initially I tried to source this from the upstream SPIFFE Helm chart
# (spiffe-csi-driver chart at helm-charts-hardened), but that chart does
# not exist as a standalone — the SPIFFE org publishes ONLY a bundled
# "spire" chart that includes csi-driver as a subchart. Since we already
# deploy SPIRE Server / Agent / Controller Manager from their own files,
# installing the bundled chart would conflict.
#
# Solution: vendor the three small manifests into
# infrastructure/spiffe-csi-driver/ (taken from the upstream project's
# example/config directory) and let ArgoCD apply them like any other
# kustomization in this repo. Simpler and easier to audit.
#
# What this installs:
#   A DaemonSet (one pod per node) that exposes the SPIRE agent socket
#   as a CSI ephemeral volume of driver "csi.spiffe.io". This is what
#   Istio's auto-injected sidecars will use to reach the SPIRE Workload
#   API — more secure than hostPath because the kubelet mediates access.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spiffe-csi-driver
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Suliman8/p5-gitops-zero-trust.git
    path: infrastructure/spiffe-csi-driver
    targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    namespace: spire-server

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
