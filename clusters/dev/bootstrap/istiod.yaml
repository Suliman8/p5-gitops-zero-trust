# ArgoCD Application — Istio "istiod" chart (the control plane).
#
# What this deploys:
#   - istiod Deployment in istio-system namespace.
#   - Validation/mutation webhooks (the latter is what auto-injects
#     sidecars into pods in labeled namespaces).
#   - A Service "istiod" on port 15010/15012/15014 used by Envoy proxies
#     to fetch their config (xDS).
#
# What this does NOT do yet:
#   - It does NOT inject sidecars anywhere. That requires labeling a
#     namespace with `istio-injection=enabled` (Phase C).
#   - It does NOT use SPIRE as its CA. The default Citadel CA is in use
#     until Phase B swaps it.
#
# DEPENDS ON: istio-base must be Synced/Healthy BEFORE this Application
# starts to sync, otherwise the chart fails referencing missing CRDs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: 1.24.1
    helm:
      values: |
        global:
          istioNamespace: istio-system
          # Pin the proxy image version to match. Without this, sidecars
          # would be injected with whatever the chart default points to
          # which can drift from the control-plane version.
          tag: 1.24.1
          # Resource requests modest enough for a kind dev cluster.
          # Production would set 4× these or more.
        pilot:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
        # Single-revision install. Same reason as in istio-base.
        revision: ""
        # ----- mesh-wide config (Phase B: SPIRE integration) -------------
        meshConfig:
          # CRITICAL: must match SPIRE's trust domain. With these aligned,
          # SVIDs issued by SPIRE (spiffe://p5.local/...) are recognised by
          # Istio as in-mesh identities. Mismatch → Istio rejects all SVIDs
          # as foreign and mTLS fails between every pair of sidecars.
          trustDomain: p5.local

          # Default proxy settings applied to every injected sidecar.
          defaultConfig:
            # Wait to start the app container until Envoy is ready. Avoids
            # the classic "app starts up, sends requests, no sidecar yet,
            # request times out" race during pod startup.
            holdApplicationUntilProxyStarts: true
            # Tell Envoy SDS (Secret Discovery Service) to read certs from
            # the SPIRE Workload API socket instead of from Citadel-issued
            # secrets. The path inside the sidecar comes from the volume
            # mount below in the injection template.
            proxyMetadata:
              # File name "socket" matches Istio's hardcoded SDS path
              # (see infrastructure/spire-agent/configmap.yaml for context).
              SPIFFE_ENDPOINT_SOCKET: unix:///run/secrets/workload-spiffe-uds/socket

          # Permit traffic to external (out-of-mesh) services. Default is
          # ALLOW_ANY; setting it explicitly so the choice is documented.
          outboundTrafficPolicy:
            mode: ALLOW_ANY

        # ----- Custom sidecar injection template "spire" -----------------
        # Pods that want SPIRE-issued certs (instead of Citadel-issued)
        # opt in by adding the annotation:
        #   inject.istio.io/templates: "sidecar,spire"
        # That applies BOTH the default "sidecar" template (the standard
        # istio-proxy container) AND this "spire" patch (the CSI volume
        # that exposes the agent socket to Envoy).
        #
        # We keep this as an OPT-IN template (not the default) so we can
        # test mesh injection in stages: first plain Citadel for sanity,
        # then SPIRE for the apps that need it.
        sidecarInjectorWebhook:
          templates:
            spire: |
              spec:
                containers:
                  - name: istio-proxy
                    volumeMounts:
                      - name: workload-socket
                        mountPath: /run/secrets/workload-spiffe-uds
                        readOnly: true
                volumes:
                  - name: workload-socket
                    csi:
                      driver: csi.spiffe.io
                      readOnly: true

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system

  # Istio writes a self-signed CA bundle into its own ValidatingWebhook at
  # runtime (chicken-and-egg bootstrap of the webhook's TLS). ArgoCD sees
  # the cluster state with a populated caBundle and the chart template
  # with empty caBundle, declares drift, and fights it forever.
  # Tell ArgoCD to ignore that one field on these two resources.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
